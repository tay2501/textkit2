name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv sync --locked --all-extras

      - name: Run tests
        run: |
          uv run --locked pytest --cov=. --cov-report=term-missing

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: |
          uv run mypy press/

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: |
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 30

  build-windows-exe:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: validate-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --group build --extra daemon

      - name: Build Windows executable
        shell: bash
        run: |
          uv run pyinstaller \
            --onedir \
            --name press \
            --distpath dist-exe \
            --noconfirm \
            --collect-all press \
            --collect-all jaconv \
            --hidden-import argcomplete \
            press/__main__.py

      - name: Archive executable
        run: python -c "import shutil; shutil.make_archive('press-windows-x64', 'zip', 'dist-exe', 'press')"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: press-windows-x64.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-release, build-artifacts, build-windows-exe]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag_name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ steps.tag_name.outputs.TAG_NAME }}^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" ${{ steps.tag_name.outputs.TAG_NAME }})
          else
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" ${PREVIOUS_TAG}..${{ steps.tag_name.outputs.TAG_NAME }})
          fi

          {
            echo "## Changes"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG:-}...${{ steps.tag_name.outputs.TAG_NAME }}"
          } > changelog.md

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Download Windows executable
        uses: actions/download-artifact@v8
        with:
          name: windows-exe
          path: .

      # Published so users (and IT departments vetting the unsigned exe for
      # endpoint-security allowlisting) can verify artifact integrity.
      - name: Generate SHA-256 checksums
        run: |
          sha256sum dist/*.whl dist/*.tar.gz press-windows-x64.zip > SHA256SUMS.txt
          {
            echo ""
            echo "## SHA-256 checksums"
            echo ""
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
          } >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(steps.tag_name.outputs.TAG_NAME, 'alpha') || contains(steps.tag_name.outputs.TAG_NAME, 'beta') || contains(steps.tag_name.outputs.TAG_NAME, 'rc') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            press-windows-x64.zip
            SHA256SUMS.txt
          fail_on_unmatched_files: false
          generate_release_notes: true

# NOTE: No PyPI publishing — the name "press" is taken on PyPI by an unrelated
# package. Distribution is via GitHub Releases (wheel + sdist + Windows zip +
# SHA256SUMS); install with `uv tool install` from the repo or release artifact.
