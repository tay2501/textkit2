name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13", "3.14"]
        experimental: [false]
        include:
          # Python 3.15 (GA 2026-10-01, PEP 790): pre-release lane to catch
          # pystray/pynput breakage early. Failures don't fail the workflow.
          - os: ubuntu-latest
            python-version: "3.15"
            experimental: true
          - os: windows-latest
            python-version: "3.15"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: |
          **/pyproject.toml
          **/requirements*.txt
          uv.lock

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      # --locked fails the build if uv.lock is out of date (unlike --frozen, which
      # silently uses a stale lockfile): https://docs.astral.sh/uv/guides/integration/github/
      run: uv sync --locked --all-extras

    - name: Lint with ruff (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run ruff check --output-format=github .
        uv run ruff format --check .

    - name: Type check with mypy (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run mypy press/ --num-workers 4

    - name: Test with pytest
      run: uv run pytest --cov=press --cov-report=xml --cov-report=term-missing --cov-report=html
      env:
        PYTHONPATH: .

    - name: Upload coverage reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: coverage-reports-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          coverage.xml
          htmlcov/
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
