name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: |
          **/pyproject.toml
          **/requirements*.txt
          uv.lock

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --all-extras --dev --frozen

    - name: Lint with ruff (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run ruff check --output-format=github .
        uv run ruff format --check .

    - name: Type check with mypy (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run mypy press/

    - name: Test with pytest
      run: uv run pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-report=html
      env:
        PYTHONPATH: .

    - name: Upload coverage reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: coverage-reports-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          coverage.xml
          htmlcov/
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
