name: Security Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Mondays at 6 AM UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv-scanner:
    name: OSV Vulnerability Scanner
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5"
    permissions:
      actions: read
      security-events: write
      contents: read
    with:
      fail-on-vuln: false

  pip-audit:
    name: pip-audit Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run pip-audit security check
        run: |
          uv run pip-audit --format json --output pip-audit-report.json || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  bandit-security:
    name: Bandit Security Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Run Bandit security linter
        run: |
          uvx --from "bandit[toml]" bandit -r . -f json -o bandit-report.json --exclude ./test,./tests,./.venv || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  semgrep:
    name: Semgrep Security Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          semgrep --config=auto --json --output=semgrep-report.json . || true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json