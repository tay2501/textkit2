name: Security Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Mondays at 6 AM UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv-scanner:
    name: OSV Vulnerability Scanner
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      actions: read
      security-events: write
      contents: read
    with:
      # Known vulnerabilities in the locked dependency set fail the build.
      # False positives: add an OSV-Scanner ignore entry with a justification.
      fail-on-vuln: true

  pip-audit:
    name: pip-audit Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        # --all-extras so pip-audit audits the same dependency set CI tests against;
        # --locked so the audit matches uv.lock exactly
        run: |
          uv sync --locked --all-extras

      - name: Run pip-audit security check
        # Gating on purpose: a known CVE in the locked dependency set must turn
        # CI red. Suppress a confirmed false positive with
        # `--ignore-vuln <ID>` and document why next to the flag.
        run: |
          uv run pip-audit --format json --output pip-audit-report.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  bandit-security:
    name: Bandit Security Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Run Bandit security linter
        # Advisory by design (SAST false-positive rate is high); findings
        # surface in the GitHub Security tab via the SARIF upload below.
        run: |
          uvx --from "bandit[toml]" bandit -r press/ -f sarif -o bandit-report.sarif || true

      - name: Upload Bandit SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always() && hashFiles('bandit-report.sarif') != ''
        with:
          sarif_file: bandit-report.sarif
          category: bandit

  semgrep:
    name: Semgrep Security Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Semgrep
        # Advisory by design (SAST false-positive rate is high); findings
        # surface in the GitHub Security tab via the SARIF upload below.
        run: |
          semgrep --config=auto --sarif --output=semgrep-report.sarif . || true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always() && hashFiles('semgrep-report.sarif') != ''
        with:
          sarif_file: semgrep-report.sarif
          category: semgrep